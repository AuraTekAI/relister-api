# nginx server block for the hosted MCP connector.
# Install: copy to /etc/nginx/sites-available/mcp.autorelister.com.au, symlink into
# sites-enabled, `nginx -t && systemctl reload nginx`, then:
#   certbot --nginx -d mcp.autorelister.com.au
# (certbot rewrites this to add the 443 server block + redirect.)

server {
    listen 80;
    server_name mcp.autorelister.com.au;

    location / {
        proxy_pass http://127.0.0.1:9090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Streamable HTTP / SSE: stream immediately, keep long-lived GETs open.
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        chunked_transfer_encoding off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
